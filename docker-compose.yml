version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: rate_limiter_postgres
    environment:
      POSTGRES_USER: ratelimiter
      POSTGRES_PASSWORD: ratelimiter_pass
      POSTGRES_DB: rate_limiter_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ratelimiter"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: rate_limiter_redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data: